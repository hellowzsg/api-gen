name: CI

# 仅手动触发（GitHub Actions 页面或 gh workflow run）
on:
  workflow_dispatch:

jobs:
  # ---- Job 1: Unit tests for internal packages ----
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: ./.github/actions/setup-env

      - name: Run internal unit tests
        run: go test ./internal/... -v -count=1

      - name: Run go vet
        run: go vet ./internal/... ./cmd/...

  # ---- Job 2: Verify example proto generation (no plugins required) ----
  example-generate:
    name: Example Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go + build apigen
        uses: ./.github/actions/setup-env
        with:
          cli: "true"

      - name: Generate simple example
        run: /tmp/apigen generate -f examples/simple/api.yaml

      - name: Verify simple example output
        run: |
          test -f examples/simple/generated/proto/config_service/config_service.proto
          grep -q "service ConfigService" examples/simple/generated/proto/config_service/config_service.proto
          grep -q "rpc GetConfigEntry" examples/simple/generated/proto/config_service/config_service.proto
          grep -q "rpc UpdateConfigEntry" examples/simple/generated/proto/config_service/config_service.proto

      - name: Generate book example
        run: /tmp/apigen generate -f examples/book/api.yaml

      - name: Verify book example output
        run: |
          test -f examples/book/generated/proto/library_service/library_service.proto
          test -f examples/book/generated/proto/admin_service/admin_service.proto
          grep -q "service LibraryService" examples/book/generated/proto/library_service/library_service.proto
          grep -q "rpc CreateBook" examples/book/generated/proto/library_service/library_service.proto
          grep -q "rpc ArchiveBook" examples/book/generated/proto/library_service/library_service.proto

      - name: Entity list (simple)
        run: /tmp/apigen entity list -f examples/simple/api.yaml

      - name: Entity list (book)
        run: /tmp/apigen entity list -f examples/book/api.yaml

  # ---- Job 3: Build book example with Go plugins + HTTP + OpenAPI ----
  example-build-book:
    name: Example Build (book)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go + protoc plugins + Node.js
        uses: ./.github/actions/setup-env
        with:
          protoc-plugins: full
          node: "true"
          cli: "true"

      - name: Build book example (generate + compile Go + HTTP + OpenAPI)
        working-directory: examples/book
        run: /tmp/apigen build -f api.yaml

      - name: Verify generated Go stubs
        run: |
          test -f examples/book/generated/go/library_service/library_service.pb.go
          test -f examples/book/generated/go/library_service/library_service_grpc.pb.go
          test -f examples/book/generated/go/library_service/library_service.pb.gw.go
          test -f examples/book/generated/go/admin_service/admin_service.pb.go
          test -f examples/book/generated/go/admin_service/admin_service_grpc.pb.go
          test -f examples/book/generated/go/admin_service/admin_service.pb.gw.go
          test -f examples/book/generated/go/demo/business/book/book.pb.go

      - name: Verify generated OpenAPI spec
        run: |
          test -f examples/book/generated/openapi/library_service/library_service.swagger.json
          test -f examples/book/generated/openapi/admin_service/admin_service.swagger.json

      - name: Verify generated TypeScript stubs
        run: |
          test -f examples/book/generated/js/library_service/library_service_pb.ts
          test -f examples/book/generated/js/admin_service/admin_service_pb.ts
          test -f examples/book/generated/js/demo/business/book/book_pb.ts

      - name: Run book e2e tests
        working-directory: examples/book
        run: go test -v -count=1 ./...

  # ---- Job 4: Build simple example with Go plugins (P0 only) ----
  example-build-simple:
    name: Example Build (simple)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go + protoc plugins
        uses: ./.github/actions/setup-env
        with:
          protoc-plugins: core
          cli: "true"

      - name: Build simple example
        working-directory: examples/simple
        run: /tmp/apigen build -f api.yaml

      - name: Verify generated Go stubs
        run: |
          test -f examples/simple/generated/go/config_service/config_service.pb.go
          test -f examples/simple/generated/go/config_service/config_service_grpc.pb.go
          test -f examples/simple/generated/go/config.pb.go

      - name: Verify no gateway files (P0, no HTTP)
        run: |
          if ls examples/simple/generated/go/config_service/*.pb.gw.go 1>/dev/null 2>&1; then
            echo "ERROR: gateway files should not exist for P0 example"
            exit 1
          fi
          echo "OK: no gateway files (P0 as expected)"

  # ---- Job 5: End-to-end test suite (testcase module) ----
  testcase-e2e:
    name: Testcase E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go + protoc plugins + Node.js (protoc-gen-es)
        uses: ./.github/actions/setup-env
        with:
          protoc-plugins: full
          node: "true"
          cli: "true"

      - name: Generate book fixture
        run: /tmp/apigen generate -f testcase/fixtures/book/api.yaml

      - name: Build book fixture
        run: /tmp/apigen build -f testcase/fixtures/book/api.yaml

      - name: Generate simple fixture
        run: /tmp/apigen generate -f testcase/fixtures/simple/api.yaml

      - name: Build simple fixture
        run: /tmp/apigen build -f testcase/fixtures/simple/api.yaml

      - name: Generate edge fixture
        run: /tmp/apigen generate -f testcase/fixtures/edge/api.yaml

      - name: Build edge fixture
        run: /tmp/apigen build -f testcase/fixtures/edge/api.yaml

      - name: Run positive e2e tests
        working-directory: testcase
        run: go test -v -count=1 ./positive/...

      - name: Run negative e2e tests
        working-directory: testcase
        run: go test -v -count=1 ./negative/...
