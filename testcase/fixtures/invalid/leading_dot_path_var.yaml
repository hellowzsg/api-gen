# E2: leading dot in path variable {key.}
syntax: v1
name: test.leading_dot_path_var
import_protos:
  - path: "proto/**/*.proto"
  - git: https://github.com/googleapis/googleapis
    ref: master
settings:
  go_repo: github.com/test/repo
  out:
    proto: generated/proto
    go: generated/go
  http:
    enable: true
    prefix: /api
entities:
  - name: foo
    key:
      type_: FooId
    resources:
      - name: bar
        type_: Bar
        version: { kind: NONE }
        reader:
          http:
            verb: get
            path: /api/foo/{key.}/bar
services:
  - name: FooService
    entities:
      - name: foo
