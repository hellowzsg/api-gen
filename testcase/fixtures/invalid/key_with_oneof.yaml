# G5: key type has oneof field (cannot bind to URL path)
syntax: v1
name: test.invalid
import_protos:
  - path: "proto/**/*.proto"
  - git: https://github.com/googleapis/googleapis
    ref: master
settings:
  go_repo: github.com/test/repo
  out:
    proto: generated/proto
    go: generated/go
  http:
    enable: true
    prefix: /api
entities:
  - name: foo
    key:
      type_: OneofKey
    resources:
      - name: bar
        type_: Bar
        version: { kind: NONE }
        reader: {}
services:
  - name: FooService
    entities:
      - name: foo
