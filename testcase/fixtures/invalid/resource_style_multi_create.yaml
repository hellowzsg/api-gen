# G2: resource style body_style with multi-resource Create is ambiguous
syntax: v1
name: test.invalid
import_protos:
  - path: "proto/**/*.proto"
  - git: https://github.com/googleapis/googleapis
    ref: master
settings:
  go_repo: github.com/test/repo
  out:
    proto: generated/proto
    go: generated/go
  http:
    enable: true
    body_style: resource
entities:
  - name: foo
    key:
      type_: FooId
    create: {}
    resources:
      - name: meta
        type_: Meta
        version: { kind: NONE }
        reader: {}
      - name: content
        type_: Content
        version: { kind: NONE }
        reader: {}
services:
  - name: FooService
    entities:
      - name: foo
