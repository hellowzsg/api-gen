syntax: v1

name: edge.example

import_protos:
  - path: "proto/**/*.proto"
  - git: https://github.com/googleapis/googleapis
    ref: master

settings:
  go_repo: github.com/hellowzsg/api-gen/testcase/fixtures/edge
  out:
    proto:   generated/proto
    go:      generated/go
  http:
    enable: true
    prefix: /edge

entities:
  # Entity 1: doc — composite key (nested OrgId + scalar), multiple resources with different version kinds
  - name: doc
    key:
      type_: DocId

    create: {}
    delete: {}

    resources:
      # STRONG version → uint64 field
      - name: meta
        type_: DocMeta
        version: { kind: STRONG, type: U64 }
        reader:
          batch: true
        writer:
          update: { mask: true }

      # WEAK version → google.protobuf.UInt64Value wrapper
      - name: content
        type_: DocContent
        version: { kind: WEAK, type: U64 }
        reader: {}
        writer:
          update: {}

      # NONE version → no version field
      - name: log
        type_: DocLog
        version: { kind: NONE }
        reader: {}
        writer:
          update: {}

  # Entity 2: tag — simple scalar key, NONE version
  # Types TagId and Tag live in edge.tag package (different from doc entity's edge.example),
  # while TagMeta lives in edge.example (cross-package: key from edge.tag, meta from edge.example).
  - name: tag
    key:
      type_: edge.tag.TagId

    create: {}
    delete: {}

    resources:
      # meta uses edge.example.TagMeta (cross-package from key type edge.tag.TagId)
      - name: meta
        type_: edge.example.TagMeta
        version: { kind: NONE }
        reader: {}
        writer:
          update: {}

      # info uses edge.tag.Tag (same package as key type)
      - name: info
        type_: edge.tag.Tag
        version: { kind: NONE }
        reader: {}
        writer:
          update: {}

services:
  - name: EdgeService
    entities:
      - name: doc
      - name: tag
    custom_methods:
      - name: ExportDoc
        request: ExportDocRequest
        response: ExportDocResponse
