syntax = "proto3";

package demo.business.book;

option go_package = "github.com/acme/demo-book/generated/go/demo/business/book;book";

// BookId 是 Book 实体的主键类型。
message BookId {
  string id = 1;
}

// BookMeta 是 Book 的元数据面资源。
message BookMeta {
  string title = 1;
  string author = 2;
  string isbn = 3;
}

// BookContent 是 Book 的内容面资源。
message BookContent {
  string text = 1;
  bytes  cover_image = 2;
}
