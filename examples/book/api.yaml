syntax: v1

name: demo.business.book

import_protos:
  - path: "proto/**/*.proto"

settings:
  go_repo: github.com/acme/demo-book
  js_repo: "@acme/demo-book"
  out:
    proto:   generated/proto
    go:      generated/go
    js:      generated/js
  http:
    enable: true
    prefix: /library

entities:
  - name: book
    key:
      type_: BookId

    create: {}
    delete: {}
    delete_soft: {}

    resources:
      - name: meta
        type_: BookMeta
        version: { kind: STRONG, type: U64 }
        reader:
          batch: true
          list: true
          list_config:
            total_size: true
        writer:
          update: { mask: true }

      - name: content
        type_: BookContent
        version: { kind: NONE }
        reader: {}
        writer:
          update: {}

services:
  - name: LibraryService
    entities:
      - name: book

  - name: AdminService
    entities:
      - name: book
        resources:
          - name: meta
            reader: { list: true }

